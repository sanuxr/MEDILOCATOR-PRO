<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Hospital Locator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Secure API Key Management
        // Replace with your actual Google Maps API Key
        const GOOGLE_MAPS_API_KEY = "AIzaSyAVqH6VHYIq3fPp-NhvQg13tWlTPyX7hBs";
    </script>
    <style>
        #map {
            height: 100%;
            width: 100%;
            border-radius: 0.5rem;
        }
        .hospital-card {
            transition: all 0.2s ease-in-out;
        }
        .hospital-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: #3b82f6;
        }
        /* Custom scrollbar for sidebar */
        #hospital-list::-webkit-scrollbar {
            width: 6px;
        }
        #hospital-list::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        #hospital-list::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        #hospital-list::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-slate-50 h-screen overflow-hidden flex flex-col font-sans text-slate-800">

    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-slate-200 py-4 px-6 z-10 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 text-white p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">MediLocator <span class="text-blue-600">Pro</span></h1>
        </div>
        <div id="status-indicator" class="text-sm font-medium px-3 py-1 rounded-full bg-slate-100 text-slate-600 flex items-center">
            <div class="w-2 h-2 rounded-full bg-yellow-400 mr-2 animate-pulse" id="status-dot"></div>
            <span id="status-text">Initializing Map...</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar for Hospital List -->
        <aside class="w-full md:w-1/3 lg:w-1/4 bg-white border-r border-slate-200 flex flex-col h-full z-10 shadow-lg">
            <div class="p-4 border-b border-slate-100 bg-slate-50">
                <h2 class="text-lg font-semibold text-slate-800 mb-1">Nearby Hospitals</h2>
                <p class="text-xs text-slate-500" id="results-meta">Searching within 10km radius...</p>
            </div>
            <div id="hospital-list" class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- Skeleton Loading -->
                <div id="loading-skeletons" class="space-y-4">
                    <div class="animate-pulse border border-slate-200 rounded-xl p-4">
                        <div class="h-4 bg-slate-200 rounded w-3/4 mb-3"></div>
                        <div class="h-3 bg-slate-200 rounded w-1/2 mb-4"></div>
                        <div class="flex gap-2">
                            <div class="h-8 bg-slate-200 rounded w-1/3"></div>
                            <div class="h-8 bg-slate-200 rounded w-1/3"></div>
                        </div>
                    </div>
                    <div class="animate-pulse border border-slate-200 rounded-xl p-4">
                        <div class="h-4 bg-slate-200 rounded w-2/3 mb-3"></div>
                        <div class="h-3 bg-slate-200 rounded w-3/4 mb-4"></div>
                        <div class="flex gap-2">
                            <div class="h-8 bg-slate-200 rounded w-1/3"></div>
                            <div class="h-8 bg-slate-200 rounded w-1/3"></div>
                        </div>
                    </div>
                </div>
                <!-- Hospital Cards will be injected here -->
            </div>
        </aside>

        <!-- Map Container -->
        <section class="flex-1 relative p-4 bg-slate-100">
            <div id="map" class="shadow-inner border border-slate-200 bg-slate-200 flex items-center justify-center">
                <!-- Map will mount here -->
            </div>
        </section>

    </main>

    <script>
        // --- Core Variables ---
        let map;
        let placesService;
        let distanceMatrixService;
        let userMarker;
        let currentInfoWindow;
        const hospitalMarkers = [];
        
        // Mumbai, Maharashtra Fallback Coordinates
        const FALLBACK_LAT = 19.0760;
        const FALLBACK_LNG = 72.8777;

        // UI Elements
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const hospitalListEl = document.getElementById('hospital-list');
        const loadingSkeletons = document.getElementById('loading-skeletons');
        const resultsMeta = document.getElementById('results-meta');

        // Update Status UI
        function setStatus(msg, type = 'info') {
            statusText.textContent = msg;
            statusDot.className = 'w-2 h-2 rounded-full mr-2';
            if (type === 'info') statusDot.classList.add('bg-blue-500');
            if (type === 'success') statusDot.classList.add('bg-green-500');
            if (type === 'error') statusDot.classList.add('bg-red-500');
            if (type === 'loading') statusDot.classList.add('bg-yellow-400', 'animate-pulse');
        }

        // --- Initialization ---
        async function initApp() {
            if (GOOGLE_MAPS_API_KEY === "YOUR_API_KEY") {
                setStatus("API Key Missing", 'error');
                loadingSkeletons.style.display = 'none';
                hospitalListEl.innerHTML = `<div class="p-4 bg-red-50 border border-red-200 text-red-600 rounded-lg text-sm">Please insert your Google Maps API key in the code to initialize the application.</div>`;
                return;
            }

            try {
                // Determine User Location
                const userPos = await getUserLocation();
                
                // Initialize Google Map
                initMap(userPos);

                // Fetch Nearby Hospitals
                const rawHospitals = await fetchNearbyHospitals(userPos);
                
                if(rawHospitals.length === 0) {
                    setStatus("No hospitals found", 'error');
                    loadingSkeletons.style.display = 'none';
                    hospitalListEl.innerHTML = `<div class="p-4 text-center text-slate-500 text-sm">No hospitals found within 10km.</div>`;
                    return;
                }

                // Get top 5 nearest
                const top5Hospitals = rawHospitals.slice(0, 5);

                // Fetch Driving Distances and ETA
                const hospitalsWithDistance = await calculateDrivingDistances(userPos, top5Hospitals);

                // Render UI and Markers
                renderHospitals(hospitalsWithDistance);
                setStatus("Live tracking active", 'success');

            } catch (error) {
                console.error("Initialization Error:", error);
                setStatus("System Error", 'error');
            }
        }

        // --- Geolocation ---
        function getUserLocation() {
            setStatus("Locating you...", 'loading');
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    console.warn("Geolocation not supported by browser. Using fallback.");
                    resolve({ lat: FALLBACK_LAT, lng: FALLBACK_LNG, isFallback: true });
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                            isFallback: false
                        });
                    },
                    (error) => {
                        console.warn("Geolocation permission denied or failed. Using fallback.", error);
                        resolve({ lat: FALLBACK_LAT, lng: FALLBACK_LNG, isFallback: true });
                    },
                    { timeout: 10000, enableHighAccuracy: true }
                );
            });
        }

        // --- Map Initialization ---
        function initMap(center) {
            setStatus("Rendering map...", 'loading');
            map = new google.maps.Map(document.getElementById("map"), {
                center: center,
                zoom: 13,
                mapTypeControl: false,
                streetViewControl: false,
                fullscreenControl: false,
                styles: [
                    { "featureType": "poi.medical", "elementType": "geometry.fill", "stylers": [{ "color": "#fecaca" }] }
                ]
            });

            currentInfoWindow = new google.maps.InfoWindow();

            // Custom Blue Marker for User
            userMarker = new google.maps.Marker({
                position: center,
                map: map,
                title: center.isFallback ? "Fallback Location (Mumbai)" : "Your Current Location",
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 10,
                    fillColor: "#3b82f6",
                    fillOpacity: 1,
                    strokeColor: "#ffffff",
                    strokeWeight: 2,
                },
                zIndex: 999
            });
            
            if(center.isFallback) {
                const fbWindow = new google.maps.InfoWindow({ content: "<div class='text-sm font-semibold'>Default Location (Location Access Denied)</div>" });
                fbWindow.open(map, userMarker);
            }

            placesService = new google.maps.places.PlacesService(map);
            distanceMatrixService = new google.maps.DistanceMatrixService();
        }

        // --- Places API Search ---
        function fetchNearbyHospitals(location) {
            setStatus("Searching nearby hospitals...", 'loading');
            return new Promise((resolve, reject) => {
                const request = {
                    location: location,
                    radius: '10000', // 10 km
                    type: ['hospital'],
                    keyword: 'hospital'
                };

                placesService.nearbySearch(request, (results, status) => {
                    if (status === google.maps.places.PlacesServiceStatus.OK) {
                        resolve(results);
                    } else if (status === google.maps.places.PlacesServiceStatus.ZERO_RESULTS) {
                        resolve([]);
                    } else {
                        reject(status);
                    }
                });
            });
        }

        // --- Distance Matrix API ---
        function calculateDrivingDistances(origin, destinations) {
            setStatus("Calculating live ETA...", 'loading');
            return new Promise((resolve, reject) => {
                const destinationLocs = destinations.map(d => d.geometry.location);

                distanceMatrixService.getDistanceMatrix({
                    origins: [origin],
                    destinations: destinationLocs,
                    travelMode: google.maps.TravelMode.DRIVING,
                    drivingOptions: {
                        departureTime: new Date(Date.now()), // Current time for traffic
                        trafficModel: 'bestguess'
                    }
                }, (response, status) => {
                    if (status === google.maps.DistanceMatrixStatus.OK) {
                        const results = response.rows[0].elements;
                        
                        const enrichedData = destinations.map((hospital, index) => {
                            const routeData = results[index];
                            return {
                                ...hospital,
                                distanceData: routeData.status === 'OK' ? {
                                    distance: routeData.distance.text, // e.g. "4.2 km"
                                    distanceValue: routeData.distance.value,
                                    duration: routeData.duration_in_traffic ? routeData.duration_in_traffic.text : routeData.duration.text // e.g. "15 mins"
                                } : null
                            };
                        });
                        
                        // Sort by driving distance
                        enrichedData.sort((a, b) => {
                            const valA = a.distanceData ? a.distanceData.distanceValue : 999999;
                            const valB = b.distanceData ? b.distanceData.distanceValue : 999999;
                            return valA - valB;
                        });

                        resolve(enrichedData);
                    } else {
                        reject(status);
                    }
                });
            });
        }

        // --- UI Rendering ---
        function renderHospitals(hospitals) {
            loadingSkeletons.style.display = 'none';
            hospitalListEl.innerHTML = '';
            
            resultsMeta.textContent = `Found ${hospitals.length} nearest facilities`;

            hospitals.forEach((hospital, index) => {
                // Create Marker
                const marker = new google.maps.Marker({
                    position: hospital.geometry.location,
                    map: map,
                    title: hospital.name,
                    icon: {
                        url: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png'
                    },
                    animation: google.maps.Animation.DROP
                });

                hospitalMarkers.push(marker);

                // Determine operational status
                const isOpen = hospital.opening_hours ? hospital.opening_hours.isOpen() : null;
                let statusBadge = '';
                if(isOpen === true) statusBadge = `<span class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-xs font-semibold">Open</span>`;
                else if(isOpen === false) statusBadge = `<span class="bg-red-100 text-red-700 px-2 py-0.5 rounded text-xs font-semibold">Closed</span>`;

                const distanceText = hospital.distanceData ? hospital.distanceData.distance : "N/A";
                const timeText = hospital.distanceData ? hospital.distanceData.duration : "N/A";
                const address = hospital.vicinity || "Address not available";

                // Create Sidebar Card
                const card = document.createElement('div');
                card.className = "hospital-card bg-white border border-slate-200 rounded-xl p-4 cursor-pointer";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-slate-800 text-sm leading-tight pr-2">${hospital.name}</h3>
                        ${statusBadge}
                    </div>
                    <p class="text-xs text-slate-500 mb-3 truncate" title="${address}">${address}</p>
                    
                    <div class="flex items-center gap-3 mt-3 pt-3 border-t border-slate-100">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Distance</span>
                            <span class="text-sm font-semibold text-slate-700">${distanceText}</span>
                        </div>
                        <div class="h-6 w-px bg-slate-200"></div>
                        <div class="flex flex-col">
                            <span class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Drive Time</span>
                            <span class="text-sm font-semibold text-blue-600 flex items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                ${timeText}
                            </span>
                        </div>
                    </div>
                `;

                // Interaction: Sidebar Click
                card.addEventListener('click', () => {
                    triggerHospitalSelection(hospital, marker, address, statusBadge, timeText, distanceText);
                });

                // Interaction: Marker Click
                marker.addListener('click', () => {
                    triggerHospitalSelection(hospital, marker, address, statusBadge, timeText, distanceText);
                    // Scroll sidebar to card
                    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    // Highlight card temporarily
                    card.classList.add('ring-2', 'ring-blue-500', 'bg-blue-50');
                    setTimeout(() => card.classList.remove('ring-2', 'ring-blue-500', 'bg-blue-50'), 1500);
                });

                hospitalListEl.appendChild(card);
            });
        }

        function triggerHospitalSelection(hospital, marker, address, statusBadge, timeText, distanceText) {
            // Pan map
            map.panTo(hospital.geometry.location);
            map.setZoom(15);
            
            // Open InfoWindow
            const infoContent = `
                <div class="p-2 max-w-xs font-sans">
                    <h4 class="font-bold text-slate-800 text-base mb-1">${hospital.name} ${statusBadge}</h4>
                    <p class="text-xs text-slate-600 mb-2">${address}</p>
                    <div class="flex items-center gap-2 text-sm text-blue-700 font-semibold bg-blue-50 p-2 rounded">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
                        ETA: ${timeText} (${distanceText})
                    </div>
                </div>
            `;
            currentInfoWindow.setContent(infoContent);
            currentInfoWindow.open(map, marker);
        }

        // --- Bootstrap Loader ---
        function loadGoogleMapsScript() {
            if (GOOGLE_MAPS_API_KEY === "YOUR_API_KEY") {
                // Trigger the initApp to handle the missing key error gracefully on screen
                window.onload = initApp;
                return;
            }

            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&libraries=places&callback=initApp`;
            script.async = true;
            script.defer = true;
            window.initApp = initApp; // Make initApp global for the callback
            document.head.appendChild(script);
        }

        // Start
        loadGoogleMapsScript();

    </script>
</body>
</html>
